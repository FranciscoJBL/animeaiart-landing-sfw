<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Glow layer -->
  <polygon points="256,116 272,240 396,256 272,272 256,396 240,272 116,256 240,240"
    fill="white" opacity="0.3" filter="url(#glow)"/>
  <!-- Main sparkle -->
  <polygon points="256,131 269,243 381,256 269,269 256,381 243,269 131,256 243,243"
    fill="white" opacity="0.85"/>
  <!-- Center core -->
  <circle cx="256" cy="256" r="14" fill="white"/>
  <!-- Accent sparkles -->
  <polygon points="175,175 179,173 183,175 179,177" fill="white" opacity="0.7" transform="scale(2) translate(-1,-1)"/>
  <polygon points="337,175 341,173 345,175 341,177" fill="white" opacity="0.6" transform="scale(1.5) translate(56,29)"/>
  <polygon points="256,360 259,355 262,360 259,365" fill="white" opacity="0.5"/>
  <!-- Small dots -->
  <circle cx="190" cy="310" r="4" fill="white" opacity="0.5"/>
  <circle cx="330" cy="200" r="3" fill="white" opacity="0.4"/>
  <circle cx="310" cy="340" r="3.5" fill="white" opacity="0.45"/>
</svg>